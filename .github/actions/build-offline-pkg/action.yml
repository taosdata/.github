name: 'Build Offline Package'
description: >
  Build an offline deployment package for TDengine / TDgpt / IDMP.
  Supports native builds and Docker-based builds for any supported OS.

inputs:
  mode:
    description: 'Run mode: native (on runner itself) or docker (inside container)'
    required: false
    default: 'docker'
  os:
    description: 'Target OS name: ubuntu, centos, kylin, openeuler'
    required: false
    default: ''
  os-ver:
    description: 'Target OS version: 22.04, 7, v10-sp3-2403, 24.03-lts-sp2'
    required: false
    default: ''
  arch:
    description: 'Target architecture: x64 or arm64 (default: auto-detect)'
    required: false
    default: ''
  docker-image:
    description: '[Advanced] Override Docker image directly (skip OS validation)'
    required: false
    default: ''
  container-name:
    description: 'Custom container name (auto-generated if empty)'
    required: false
    default: ''
  container-engine:
    description: 'Container runtime: docker or podman'
    required: false
    default: 'docker'
  docker-platform:
    description: 'Platform override for cross-arch builds, e.g. linux/arm64'
    required: false
    default: ''
  docker-extra-args:
    description: 'Extra arguments passed to docker run'
    required: false
    default: ''
  cleanup-container:
    description: 'Remove container after build (true/false)'
    required: false
    default: 'true'
  action:
    description: 'What to do: build, test, or build-and-test'
    required: false
    default: 'build'
  output-dir:
    description: 'Host directory where the package will be written'
    required: false
    default: ''
  cache-dir:
    description: 'Host cache directory for downloads, shared across container runs (default: /tmp/taos-packages)'
    required: false
    default: ''
  system-packages:
    description: 'Comma-separated system packages (e.g. gdb,valgrind,bpftrace,perf)'
    required: false
    default: ''
  python-version:
    description: 'Python version to package (e.g. 3.10)'
    required: false
    default: ''
  python-packages:
    description: 'Comma-separated Python pip packages'
    required: false
    default: ''
  python-requirements:
    description: 'URL or path to a requirements file'
    required: false
    default: ''
  pkg-label:
    description: 'Package label / suffix for the tar.gz filename'
    required: false
    default: ''
  deploy-type:
    description: 'Deployment type: tsdb (default) | idmp | tdgpt'
    required: false
    default: 'tsdb'
  tdgpt-all:
    description: 'Build ALL TDgpt model venvs (only meaningful when deploy-type=tdgpt)'
    required: false
    default: 'false'
  tdengine-tsdb-ver:
    description: 'TDengine version tag for requirements download (e.g. 3.4.0.8)'
    required: false
    default: ''
  pip-index-url:
    description: 'Custom pip mirror URL'
    required: false
    default: ''
  pytorch-whl-url:
    description: 'Custom PyTorch wheel mirror URL'
    required: false
    default: ''
  install-docker:
    description: 'Include Docker binaries in the offline package (true/false)'
    required: false
    default: 'false'
  docker-version:
    description: 'Docker version to package'
    required: false
    default: ''
  install-docker-compose:
    description: 'Include Docker Compose in the offline package (true/false)'
    required: false
    default: 'false'
  docker-compose-version:
    description: 'Docker Compose version to package'
    required: false
    default: ''
  install-java:
    description: 'Include Java JRE in the offline package (true/false)'
    required: false
    default: 'false'
  java-version:
    description: 'Java version (8,11,17,21,23)'
    required: false
    default: ''
  idmp-ver:
    description: 'IDMP version for downloading requirements from TDasset repo (e.g. 1.0.12.10, maps to tag ver-<ver>)'
    required: false
    default: ''
  gh-token:
    description: 'GitHub personal access token for private repos (required for TDasset)'
    required: false
    default: ''
  nexus-url:
    description: 'Nexus mirror base URL (e.g. https://nexus.example.com). Injects a transparent proxy repo into the build container. Leave empty to disable.'
    required: false
    default: ''

outputs:
  output-dir:
    description: 'Directory containing the built offline package'
    value: ${{ steps.build.outputs.output_dir }}

runs:
  using: 'composite'
  steps:
    - name: Set script permissions
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        chmod +x "$ACTION_PATH/../../scripts/offline_env/build_offline_pkg.sh"
        chmod +x "$ACTION_PATH/../../scripts/offline_env/prepare_offline_pkg.sh"

    - name: Build offline package
      id: build
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_OS: ${{ inputs.os }}
        INPUT_OS_VER: ${{ inputs.os-ver }}
        INPUT_ARCH: ${{ inputs.arch }}
        INPUT_DOCKER_IMAGE: ${{ inputs.docker-image }}
        INPUT_CONTAINER_NAME: ${{ inputs.container-name }}
        INPUT_CONTAINER_ENGINE: ${{ inputs.container-engine }}
        INPUT_DOCKER_PLATFORM: ${{ inputs.docker-platform }}
        INPUT_DOCKER_EXTRA_ARGS: ${{ inputs.docker-extra-args }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_CLEANUP_CONTAINER: ${{ inputs.cleanup-container }}
        INPUT_SYSTEM_PACKAGES: ${{ inputs.system-packages }}
        INPUT_PYTHON_VERSION: ${{ inputs.python-version }}
        INPUT_PYTHON_PACKAGES: ${{ inputs.python-packages }}
        INPUT_PYTHON_REQUIREMENTS: ${{ inputs.python-requirements }}
        INPUT_PKG_LABEL: ${{ inputs.pkg-label }}
        INPUT_DEPLOY_TYPE: ${{ inputs.deploy-type }}
        INPUT_TDGPT_ALL: ${{ inputs.tdgpt-all }}
        INPUT_TDENGINE_TSDB_VER: ${{ inputs.tdengine-tsdb-ver }}
        INPUT_PIP_INDEX_URL: ${{ inputs.pip-index-url }}
        INPUT_PYTORCH_WHL_URL: ${{ inputs.pytorch-whl-url }}
        INPUT_INSTALL_DOCKER: ${{ inputs.install-docker }}
        INPUT_DOCKER_VERSION: ${{ inputs.docker-version }}
        INPUT_INSTALL_DOCKER_COMPOSE: ${{ inputs.install-docker-compose }}
        INPUT_DOCKER_COMPOSE_VERSION: ${{ inputs.docker-compose-version }}
        INPUT_INSTALL_JAVA: ${{ inputs.install-java }}
        INPUT_JAVA_VERSION: ${{ inputs.java-version }}
        INPUT_IDMP_VER: ${{ inputs.idmp-ver }}
        INPUT_GH_TOKEN: ${{ inputs.gh-token }}
        INPUT_NEXUS_URL: ${{ inputs.nexus-url }}
      run: |
        echo "::group::Building offline package ($INPUT_MODE mode, os=$INPUT_OS:$INPUT_OS_VER)"

        ARGS=()
        ARGS+=(--mode="$INPUT_MODE")
        ARGS+=(--action="$INPUT_ACTION")

        # OS target flags
        [[ -n "$INPUT_OS"              ]] && ARGS+=(--os="$INPUT_OS")
        [[ -n "$INPUT_OS_VER"          ]] && ARGS+=(--os-ver="$INPUT_OS_VER")
        [[ -n "$INPUT_ARCH"            ]] && ARGS+=(--arch="$INPUT_ARCH")

        # Orchestrator flags
        [[ -n "$INPUT_DOCKER_IMAGE"      ]] && ARGS+=(--docker-image="$INPUT_DOCKER_IMAGE")
        [[ -n "$INPUT_CONTAINER_NAME"    ]] && ARGS+=(--container-name="$INPUT_CONTAINER_NAME")
        [[ -n "$INPUT_CONTAINER_ENGINE"  ]] && ARGS+=(--container-engine="$INPUT_CONTAINER_ENGINE")
        [[ -n "$INPUT_DOCKER_PLATFORM"   ]] && ARGS+=(--docker-platform="$INPUT_DOCKER_PLATFORM")
        [[ -n "$INPUT_DOCKER_EXTRA_ARGS" ]] && ARGS+=(--docker-extra-args="$INPUT_DOCKER_EXTRA_ARGS")
        [[ -n "$INPUT_OUTPUT_DIR"        ]] && ARGS+=(--output-dir="$INPUT_OUTPUT_DIR")
        [[ -n "$INPUT_CACHE_DIR"         ]] && ARGS+=(--cache-dir="$INPUT_CACHE_DIR")
        ARGS+=(--cleanup-container="$INPUT_CLEANUP_CONTAINER")

        # Pass-through flags for prepare_offline_pkg.sh
        [[ -n "$INPUT_SYSTEM_PACKAGES"     ]] && ARGS+=(--system-packages="$INPUT_SYSTEM_PACKAGES")
        [[ -n "$INPUT_PYTHON_VERSION"      ]] && ARGS+=(--python-version="$INPUT_PYTHON_VERSION")
        [[ -n "$INPUT_PYTHON_PACKAGES"     ]] && ARGS+=(--python-packages="$INPUT_PYTHON_PACKAGES")
        [[ -n "$INPUT_PYTHON_REQUIREMENTS" ]] && ARGS+=(--python-requirements="$INPUT_PYTHON_REQUIREMENTS")
        [[ -n "$INPUT_PKG_LABEL"           ]] && ARGS+=(--pkg-label="$INPUT_PKG_LABEL")
        [[ -n "$INPUT_DEPLOY_TYPE" && "$INPUT_DEPLOY_TYPE" != "tsdb" ]] && ARGS+=(--deploy-type="$INPUT_DEPLOY_TYPE")
        [[ "$INPUT_TDGPT_ALL" == "true"    ]] && ARGS+=(--tdgpt-all)
        [[ -n "$INPUT_TDENGINE_TSDB_VER"   ]] && ARGS+=(--tdengine-tsdb-ver="$INPUT_TDENGINE_TSDB_VER")
        [[ -n "$INPUT_PIP_INDEX_URL"       ]] && ARGS+=(--pip-index-url="$INPUT_PIP_INDEX_URL")
        [[ -n "$INPUT_PYTORCH_WHL_URL"     ]] && ARGS+=(--pytorch-whl-url="$INPUT_PYTORCH_WHL_URL")
        [[ "$INPUT_INSTALL_DOCKER" == "true" ]] && ARGS+=(--install-docker)
        [[ -n "$INPUT_DOCKER_VERSION"      ]] && ARGS+=(--docker-version="$INPUT_DOCKER_VERSION")
        [[ "$INPUT_INSTALL_DOCKER_COMPOSE" == "true" ]] && ARGS+=(--install-docker-compose)
        [[ -n "$INPUT_DOCKER_COMPOSE_VERSION" ]] && ARGS+=(--docker-compose-version="$INPUT_DOCKER_COMPOSE_VERSION")
        [[ "$INPUT_INSTALL_JAVA" == "true" ]] && ARGS+=(--install-java)
        [[ -n "$INPUT_JAVA_VERSION"        ]] && ARGS+=(--java-version="$INPUT_JAVA_VERSION")
        [[ -n "$INPUT_IDMP_VER"            ]] && ARGS+=(--idmp-ver="$INPUT_IDMP_VER")
        [[ -n "$INPUT_GH_TOKEN"            ]] && ARGS+=(--gh-token="$INPUT_GH_TOKEN")
        [[ -n "$INPUT_NEXUS_URL"           ]] && ARGS+=(--nexus-url="$INPUT_NEXUS_URL")

        "$ACTION_PATH/../../scripts/offline_env/build_offline_pkg.sh" "${ARGS[@]}"

        # Export output directory
        if [[ -n "$INPUT_OUTPUT_DIR" ]]; then
          echo "output_dir=$INPUT_OUTPUT_DIR" >> "$GITHUB_OUTPUT"
        else
          echo "output_dir=$ACTION_PATH/../../scripts/offline_env/offline_pkgs" >> "$GITHUB_OUTPUT"
        fi

        echo "::endgroup::"

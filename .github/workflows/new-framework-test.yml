name: New Framework Tests

on:
  workflow_call:
    inputs:
      tdinternal:
        description: "Is the PR from TDinternal?"
        required: true
        type: boolean
      specified_source_branch:
        description: "Enter the source branch name of TDengine"
        required: false
        default: "unavailable"
        type: string
      specified_target_branch:
        description: "Enter the target branch name of TDengine"
        required: false
        default: "unavailable"
        type: string
      specified_pr_number:
        description: "Enter the PR number of TDengine"
        required: false
        default: "unavailable"
        type: string

jobs:
  validate_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"

      - name: Get all changed case files
        id: changed-case-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            test/cases/**/test_*.py
            test/cases/**/test_*.sh

      - name: Validate test files
        if: steps.changed-case-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-case-files.outputs.all_changed_files }}
        run: |
          EXIT_CODE=0
          for file in ${ALL_CHANGED_FILES}; do
            python .github/scripts/validate_tests.py "$file" || EXIT_CODE=1
          done
          exit $EXIT_CODE

  run-tests:
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, macos, windows]
        include:
          - platform: linux
            runner_group: CI
            runner_labels: [self-hosted, Linux, X64, new-framework]
            WKDIR: "/var/lib/jenkins/workspace"
            WK: "/var/lib/jenkins/workspace/TDinternal"
            WKC: "/var/lib/jenkins/workspace/TDinternal/community"
          - platform: macos
            runner_group: CI
            runner_labels: [self-hosted, macOS, X64, testing]
            WKDIR: "/var/lib/jenkins/workspace"
            WK: "/var/lib/jenkins/workspace/TDinternal"
            WKC: "/var/lib/jenkins/workspace/TDinternal/community"
          - platform: windows
            runner_group: CI
            runner_labels: [self-hosted, Windows, X64, test-win]
            WKDIR: 'C:\\workspace\\0' # adjust as needed for your windows runners
            WK: 'C:\\workspace\\0\\TDinternal'
            WKC: 'C:\\workspace\\TDinternal\\community'
    runs-on:
      group: ${{ matrix.runner_group }}
      labels: ${{ matrix.runner_labels }}

    needs: validate_tests

    timeout-minutes: 200

    env:
      CONTAINER_NAME: "taosd-test"
      WKDIR: ${{ matrix.WKDIR }}
      WK: ${{ matrix.WK }}
      WKC: ${{ matrix.WKC }}
      IS_TDINTERNAL: ${{ inputs.tdinternal }}
      CURRENT_PLATFORM: ${{ matrix.platform }}
      TARGET_BRANCH: ${{ inputs.specified_target_branch != 'unavailable' && inputs.specified_target_branch || github.event.pull_request.base.ref || github.ref_name }}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      LANG: en_US.UTF-8

    defaults:
      run:
        working-directory: ${{ github.workspace }}/.github/scripts/
        shell: ${{ matrix.platform == 'windows' && 'cmd' || 'bash' }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          repository: "taosdata/.github"
          ref: "compat_branch"
          fetch-depth: 0

      - name: Debug env
        run: |
          echo "platform=${{ matrix.platform }}"
          echo "TARGET_BRANCH=${{ env.TARGET_BRANCH }}"

      - name: Prepare the environment
        if: matrix.platform == 'linux' || env.TARGET_BRANCH != '3.3.6'
        run: python3 prepare_test_env.py
        env:
          WKDIR: ${{ env.WKDIR }}
          IS_TDINTERNAL: ${{ inputs.tdinternal }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          GITHUB_EVENT: ${{ toJson(github.event) }}
          GITHUB_INPUTS: ${{ toJson(inputs) }}

      - name: Check assert testing
        if: >
          env.IS_TDINTERNAL == 'false' &&
          env.TARGET_BRANCH != '3.1' &&
          matrix.platform == 'linux'
        run: python3 test_runner.py
        env:
          WKDIR: ${{ env.WKDIR }}
          TEST_TYPE: "assert"

      - name: Check void function testing
        if: >
          env.IS_TDINTERNAL == 'false' &&
          env.TARGET_BRANCH != '3.1' &&
          matrix.platform == 'linux'
        run: python3 test_runner.py
        env:
          TEST_TYPE: "void"

      - name: Build docker or repo
        if: matrix.platform == 'linux' || env.TARGET_BRANCH != '3.3.6'
        run: python3 build.py
        env:
          BUILD_TYPE: ${{ matrix.platform == 'linux' && 'docker' || 'repo' }}

      - name: Run function returns with a null pointer scan testing
        if: >
          env.IS_TDINTERNAL == 'false' &&
          env.TARGET_BRANCH != '3.1' &&
          matrix.platform == 'linux'
        run: python3 test_runner.py
        env:
          TEST_TYPE: "function_returns"

      - name: Start upgrade compatibility tests task on background
        if: matrix.platform == 'linux'
        run: |
          log_dir="${WKDIR}/log/upgrade_compat"
          mkdir -p "${WKDIR}/tmp" "$log_dir"
          (
            bash ${WKC}/test/ci/run_upgrade_compat.sh -w ${WKDIR} -l ${log_dir} -e \
              >> "${log_dir}/ci_output.log" 2>&1
            echo $? > "${WKDIR}/tmp/upgrade_compat_exit.txt"
          ) &
          echo $! > "${WKDIR}/tmp/upgrade_compat.pid"
          echo "[upgrade_compat] Started in background, PID=$(cat ${WKDIR}/tmp/upgrade_compat.pid)"

      - name: Run function test cases
        if: matrix.platform == 'linux' || env.TARGET_BRANCH != '3.3.6'
        run: python3 test_runner.py
        env:
          TEST_TYPE: "function"

      - name: Checking upgrade compatibility tests finished
        if: matrix.platform == 'linux'
        run: |
          pid_file="${WKDIR}/tmp/upgrade_compat.pid"
          exit_file="${WKDIR}/tmp/upgrade_compat_exit.txt"
          log_file="${WKDIR}/log/upgrade_compat/ci_output.log"

          if [ ! -f "$pid_file" ]; then
            echo "ERROR: upgrade compat was not started (no PID file found)"
            exit 1
          fi

          pid=$(cat "$pid_file")
          echo "[upgrade_compat] Streaming live output (PID: $pid)..."

          # Wait up to 60s for the log file to appear
          waited=0
          while [ ! -f "$log_file" ] && [ $waited -lt 60 ]; do
            sleep 1
            waited=$((waited + 1))
          done

          # Stream log in real-time via tail -f (background)
          if [ -f "$log_file" ]; then
            tail -f "$log_file" &
            tail_pid=$!
          fi

          # Wait for the main process to exit
          while kill -0 "$pid" 2>/dev/null; do
            sleep 5
          done

          # Give tail 1s to flush remaining output before killing it
          sleep 1
          kill $tail_pid 2>/dev/null || true
          wait $tail_pid 2>/dev/null || true

          echo ""
          echo "[upgrade_compat] Process completed."

          if [ -f "$exit_file" ]; then
            ret=$(cat "$exit_file")
            echo "[upgrade_compat] Exit code: $ret"
            exit $ret
          else
            echo "ERROR: no exit code file found, assuming failure"
            exit 1
          fi
